# Nginx cache policy for SPA deployments to avoid stale frontend code in browsers.
# Include this in your server block for the site.

# Always fetch the latest HTML shell.
location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    expires -1;
}

# Optional: apply no-cache to root and any direct SPA HTML request.
location = / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    try_files $uri $uri/ /index.html;
}

# Hashed assets can be cached aggressively because filename changes on each build.
location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}
